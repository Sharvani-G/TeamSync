name: Build Android APK

on:
  workflow_dispatch:
  push:
    branches: ["main", "develop"]
  pull_request:
    branches: ["main"]

permissions:
  contents: write

jobs:
  build-apk:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: '3.41.9'

      - name: Install dependencies
        run: flutter pub get

      - name: Run analyzer
        run: flutter analyze lib/
        continue-on-error: true

      - name: Run tests
        run: flutter test
        continue-on-error: true

      - name: Build release APK
        run: flutter build apk --release

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: teamsync-release-apk
          path: build/app/outputs/flutter-apk/app-release.apk
          if-no-files-found: error
          retention-days: 30

      - name: Display APK info
        if: success()
        run: |
          echo "=== APK Build Summary ==="
          ls -lh build/app/outputs/flutter-apk/app-release.apk
          echo ""
          echo "APK successfully generated!"
          echo "Size: $(du -h build/app/outputs/flutter-apk/app-release.apk | cut -f1)"
          echo ""
          echo "Download from GitHub Actions artifacts"
